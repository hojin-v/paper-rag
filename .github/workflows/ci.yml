name: CI

# PR과 main 이외 브랜치 push에서 직접 돌고, deploy.yml이 배포 전 게이트로 재사용한다
# (workflow_call). GitHub 클라우드(ubuntu) 러너에서 실행되므로 온프레미스 서버에 접근하지
# 않는다 — 순수 테스트/린트 단계다.
on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치 (락파일 고정, ocr/ingest-full 제외)
        # ocr/ingest-full extra(paddlepaddle 등)는 테스트에 필요 없고 용량이 커서 뺀다.
        # 테스트는 오프라인 설계라 DB/LLM/임베딩/Paddle을 페이크로 대체해 돌아간다.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ingest,embed,worker,ui]" -c requirements-lock.txt
          pip install pgserver

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        run: pytest -q

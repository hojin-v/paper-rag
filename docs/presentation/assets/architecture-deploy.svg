<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title">
  <title id="title">배포 파이프라인</title>
  <defs>
    <marker id="dArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#33475b"/></marker>
    <marker id="dArrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2f9e6f"/></marker>
    <marker id="dArrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#c2591b"/></marker>
    <style>
      .title{font:700 26px system-ui,sans-serif;fill:#0f2438}
      .lanelabel{font:700 15px system-ui,sans-serif}
      .cardMain{font:600 14.5px system-ui,sans-serif;fill:#1e293b;text-anchor:middle}
      .cardCode{font:500 10.5px ui-monospace,monospace;fill:#64748b;text-anchor:middle}
      .flow{stroke:#33475b;stroke-width:2.4;fill:none;marker-end:url(#dArrow)}
      .okflow{stroke:#2f9e6f;stroke-width:2.4;fill:none;marker-end:url(#dArrowGreen)}
      .badflow{stroke:#c2591b;stroke-width:2.2;fill:none;stroke-dasharray:7,5;marker-end:url(#dArrowRed)}
      .okText{font:700 13px system-ui,sans-serif;fill:#22855c;text-anchor:middle}
      .badText{font:700 13px system-ui,sans-serif;fill:#c2591b;text-anchor:middle}
      .note{font:500 13px system-ui,sans-serif;fill:#5b6b7d}
    </style>
  </defs>

  <rect width="1400" height="600" fill="#ffffff"/>
  <text x="70" y="42" class="title">배포 파이프라인 (CD)</text>

  <!-- Lane 1: 트리거 -->
  <rect x="70" y="80" width="1260" height="150" rx="6" fill="#eef4ff" stroke="#c3d8f2" stroke-width="1.5"/>
  <text x="100" y="106" class="lanelabel" fill="#2b6cb0">① 트리거 — GitHub Actions</text>

  <rect x="120" y="132" width="195" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="217" y="159" class="cardMain">main 병합</text>
  <text x="217" y="177" class="cardCode">git push / merge</text>

  <rect x="395" y="132" width="205" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="497" y="159" class="cardMain">CI 테스트 게이트</text>
  <text x="497" y="177" class="cardCode">ci.yml · 클라우드</text>

  <rect x="680" y="132" width="205" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="782" y="159" class="cardMain">CD 배포</text>
  <text x="782" y="177" class="cardCode">deploy.yml</text>

  <rect x="965" y="132" width="245" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1087" y="159" class="cardMain">셀프호스트 러너</text>
  <text x="1087" y="177" class="cardCode">온프레미스</text>

  <path d="M315,164 L392,164" class="flow"/>
  <path d="M600,164 L677,164" class="flow"/>
  <path d="M885,164 L962,164" class="flow"/>

  <!-- Lane 2: 배포 실행 -->
  <rect x="70" y="262" width="1260" height="286" rx="6" fill="#f1f7f4" stroke="#c3e2d5" stroke-width="1.5"/>
  <text x="100" y="288" class="lanelabel" fill="#0f766e">② 배포 실행 — scripts/deploy.sh</text>

  <!-- connector 러너 → 이미지 빌드 -->
  <path d="M1087,196 L1087,232 L167,232 L167,330" class="flow"/>

  <!-- deploy steps -->
  <rect x="80" y="330" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="175" y="357" class="cardMain">이미지 빌드</text>
  <text x="175" y="375" class="cardCode">paperrag:{git_sha}</text>

  <rect x="302" y="330" width="196" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="400" y="357" class="cardMain">앱 서비스 정지</text>
  <text x="400" y="375" class="cardCode">embedder·api·worker·ui</text>

  <rect x="530" y="330" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="625" y="357" class="cardMain">DB 마이그레이션</text>
  <text x="625" y="375" class="cardCode">0001 ~ 0006</text>

  <rect x="752" y="330" width="160" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="832" y="357" class="cardMain">재기동</text>
  <text x="832" y="375" class="cardCode">restart</text>

  <rect x="944" y="330" width="170" height="64" rx="10" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.6"/>
  <text x="1029" y="357" class="cardMain">헬스체크</text>
  <text x="1029" y="375" class="cardCode">/ready</text>

  <path d="M270,362 L299,362" class="flow"/>
  <path d="M498,362 L527,362" class="flow"/>
  <path d="M720,362 L749,362" class="flow"/>
  <path d="M912,362 L941,362" class="flow"/>

  <!-- 성공 -->
  <path d="M1029,394 L1029,452" class="okflow"/>
  <text x="1029" y="478" class="okText">성공 → 무중단 반영 완료 ✓</text>

  <!-- 실패 → 롤백 -->
  <rect x="470" y="440" width="240" height="60" rx="10" fill="#fff4ec" stroke="#e0a878" stroke-width="1.4"/>
  <text x="590" y="466" class="cardMain">이전 SHA로 롤백</text>
  <text x="590" y="485" class="cardCode">재빌드 없이 즉시 재기동</text>
  <path d="M990,394 L990,420 L712,420 L712,458" class="badflow"/>
  <text x="856" y="412" class="badText">실패 시</text>

  <text x="100" y="528" class="note">상시 서비스 postgres · redis · ollama 는 배포 중에도 중지하지 않음 (무중단) · 단일 이미지를 embedder·api·worker·ui 4개 서비스가 공유</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title">
  <title id="title">시스템 아키텍처</title>
  <defs>
    <marker id="sArrowSolid" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#33475b"/>
    </marker>
    <marker id="sArrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c8a9a"/>
    </marker>
    <style>
      .title{font:700 26px system-ui,sans-serif;fill:#0f2438}
      .lanelabel{font:700 15px system-ui,sans-serif}
      .lanenote{font:500 12.5px system-ui,sans-serif;fill:#8a99a8;text-anchor:middle}
      .pillText{font:700 12px system-ui,sans-serif;fill:#ffffff;text-anchor:middle}
      .cardMain{font:600 14px system-ui,sans-serif;fill:#1e293b;text-anchor:middle}
      .cardCode{font:500 10.5px ui-monospace,monospace;fill:#64748b;text-anchor:middle}
      .foot{font:500 12px system-ui,sans-serif;fill:#8494a4;text-anchor:end}
      .solid{stroke:#33475b;stroke-width:2.2;fill:none;marker-end:url(#sArrowSolid)}
      .dashed{stroke:#7c8a9a;stroke-width:2;fill:none;stroke-dasharray:6,5;marker-end:url(#sArrowDashed)}
    </style>
  </defs>

  <rect width="1400" height="600" fill="#ffffff"/>
  <text x="70" y="42" class="title">시스템 아키텍처</text>

  <rect x="70" y="90" width="1260" height="140" rx="6" fill="#eaf2ff" stroke="#bcd6f2" stroke-width="1.5"/>
  <text x="100" y="113" class="lanelabel" fill="#2b6cb0">클라이언트</text>

  <rect x="70" y="250" width="1260" height="140" rx="6" fill="#e8f7f3" stroke="#b9e4d8" stroke-width="1.5"/>
  <text x="100" y="273" class="lanelabel" fill="#0f766e">애플리케이션 서비스</text>

  <rect x="70" y="410" width="1260" height="140" rx="6" fill="#f1f3f7" stroke="#d3d9e3" stroke-width="1.5"/>
  <text x="100" y="433" class="lanelabel" fill="#475569">저장·모델 서빙</text>

  <!-- Lane1 클라이언트 -->
  <rect x="380" y="128" width="180" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="470" y="155" class="cardMain">웹 UI</text>
  <text x="470" y="173" class="cardCode">Streamlit :8501</text>

  <rect x="630" y="128" width="180" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="720" y="155" class="cardMain">외부 클라이언트</text>
  <text x="720" y="173" class="cardCode">REST 호출</text>

  <!-- Lane2 애플리케이션 서비스 -->
  <rect x="370" y="288" width="200" height="64" rx="10" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.7"/>
  <text x="470" y="313" class="cardMain">REST API</text>
  <text x="470" y="333" class="cardCode">:8000 · 검색 + 검수 라우터</text>

  <rect x="625" y="288" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="720" y="313" class="cardMain">embedder</text>
  <text x="720" y="333" class="cardCode">BGE-M3 :8100</text>

  <rect x="875" y="288" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="970" y="313" class="cardMain">비동기 워커</text>
  <text x="970" y="333" class="cardCode">celery worker</text>

  <!-- Lane3 저장·모델 서빙 -->
  <rect x="375" y="448" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="470" y="475" class="cardMain">PostgreSQL+pgvector</text>
  <text x="470" y="493" class="cardCode">:5433</text>

  <rect x="625" y="448" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="720" y="475" class="cardMain">Ollama</text>
  <text x="720" y="493" class="cardCode">:11434 LLM</text>

  <rect x="875" y="448" width="190" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="970" y="475" class="cardMain">Redis</text>
  <text x="970" y="493" class="cardCode">:6379 broker</text>

  <!-- ===== 요청(실선) / 응답(점선) ===== -->
  <!-- 1. 웹 UI ↔ REST API (01) -->
  <path d="M455,192 L455,288" class="solid"/>
  <path d="M485,288 L485,192" class="dashed"/>

  <!-- 2. 외부 클라이언트 ↔ REST API -->
  <path d="M700,192 L520,288" class="solid"/>
  <path d="M540,288 L720,192" class="dashed"/>

  <!-- 3. REST API ↔ PostgreSQL (03) -->
  <path d="M462,352 L462,448" class="solid"/>
  <path d="M492,448 L492,352" class="dashed"/>

  <!-- 4. REST API ↔ Ollama (04) -->
  <path d="M545,352 L665,448" class="solid"/>
  <path d="M685,448 L565,352" class="dashed"/>

  <!-- 5. REST API ↔ embedder (02) -->
  <path d="M570,314 L625,314" class="solid"/>
  <path d="M625,332 L570,332" class="dashed"/>

  <!-- 6. 비동기 워커 → embedder -->
  <path d="M875,320 L815,320" class="solid"/>

  <!-- 7. 비동기 워커 → Redis (broker 소비) -->
  <path d="M958,352 L958,448" class="solid"/>

  <!-- 8. 비동기 워커 → Ollama -->
  <path d="M888,352 L775,448" class="solid"/>

  <!-- 9. 비동기 워커 → PostgreSQL (적재, 하단 직교 경유) -->
  <path d="M900,352 L900,416 L508,416 L508,448" class="solid"/>

  <!-- 10. REST API → Redis (작업 큐 등록, 하단 직교 경유) -->
  <path d="M520,352 L520,400 L918,400 L918,448" class="solid"/>

  <!-- ===== 검색 요청 경로 pill 01~04 ===== -->
  <rect x="438" y="228" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="455" y="244" class="pillText">01</text>
  <rect x="580" y="286" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="597" y="302" class="pillText">02</text>
  <rect x="428" y="372" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="445" y="388" class="pillText">03</text>
  <rect x="556" y="372" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="573" y="388" class="pillText">04</text>

  <text x="70" y="582" class="lanenote" style="text-anchor:start">단일 이미지(paperrag)를 api · worker · embedder · ui 4개 서비스가 공유</text>
  <text x="1330" y="582" class="foot">실선 = 요청/호출 · 점선 = 응답/반환 · 01~04 검색 요청 경로</text>
</svg>

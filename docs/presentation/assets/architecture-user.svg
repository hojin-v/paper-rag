<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="540" viewBox="0 0 1500 540" role="img" aria-labelledby="title">
  <title id="title">사용자 아키텍처</title>
  <defs>
    <marker id="uArrowSolid" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#33475b"/>
    </marker>
    <marker id="uArrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c8a9a"/>
    </marker>
    <style>
      .title{font:700 26px system-ui,sans-serif;fill:#0f2438}
      .grouplabel{font:600 13px system-ui,sans-serif;fill:#64748b;text-anchor:middle}
      .lanelabel{font:700 15px system-ui,sans-serif}
      .pillText{font:700 13px system-ui,sans-serif;fill:#ffffff;text-anchor:middle}
      .cardMain{font:600 15px system-ui,sans-serif;fill:#1e293b;text-anchor:middle}
      .cardCode{font:500 10.5px ui-monospace,monospace;fill:#64748b;text-anchor:middle}
      .solid{stroke:#33475b;stroke-width:2.2;fill:none;marker-end:url(#uArrowSolid)}
      .dashed{stroke:#7c8a9a;stroke-width:2;fill:none;stroke-dasharray:6,5;marker-end:url(#uArrowDashed)}
    </style>
  </defs>

  <rect width="1500" height="540" fill="#ffffff"/>
  <text x="70" y="42" class="title">사용자 아키텍처</text>

  <text x="410" y="76" class="grouplabel">등록·검수 사용자 흐름</text>
  <text x="1175" y="76" class="grouplabel">검색 사용자 흐름</text>

  <rect x="70" y="92" width="1360" height="190" rx="6" fill="#eaf2ff" stroke="#bcd6f2" stroke-width="1.5"/>
  <text x="100" y="115" class="lanelabel" fill="#2b6cb0">사용자</text>

  <rect x="70" y="302" width="1360" height="190" rx="6" fill="#f1f4f7" stroke="#d3dbe3" stroke-width="1.5"/>
  <text x="100" y="325" class="lanelabel" fill="#475569">시스템</text>

  <!-- ===== stage cards: 등록·검수 (01~04) ===== -->
  <!-- 01 -->
  <rect x="80" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="155" y="192" class="cardMain">PDF 업로드</text>
  <rect x="138" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="155" y="98" class="pillText">01</text>

  <rect x="80" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="155" y="392" class="cardMain">레이아웃 분석</text>
  <text x="155" y="410" class="cardCode">POST /documents</text>

  <!-- 02 -->
  <rect x="250" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="325" y="192" class="cardMain">레이아웃 검수</text>
  <rect x="308" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="325" y="98" class="pillText">02</text>

  <rect x="250" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="325" y="392" class="cardMain">블록 교정 저장</text>
  <text x="325" y="410" class="cardCode">PUT /blocks/{block_id}</text>

  <!-- 03 -->
  <rect x="420" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="495" y="192" class="cardMain">OCR 검수</text>
  <rect x="478" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="495" y="98" class="pillText">03</text>

  <rect x="420" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="495" y="392" class="cardMain">검수 완료 처리</text>
  <text x="495" y="410" class="cardCode">POST /confirm-ocr</text>

  <!-- 04 -->
  <rect x="590" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="665" y="192" class="cardMain">적재 확인</text>
  <rect x="648" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="665" y="98" class="pillText">04</text>

  <rect x="590" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="665" y="392" class="cardMain">DB 적재</text>
  <text x="665" y="410" class="cardCode">POST /ingest</text>

  <!-- ===== stage cards: 검색 (01~03) ===== -->
  <rect x="930" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1005" y="192" class="cardMain">자연어 질의</text>
  <rect x="988" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="1005" y="98" class="pillText">01</text>

  <rect x="930" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1005" y="392" class="cardMain">키워드 매칭</text>
  <text x="1005" y="410" class="cardCode">POST /search</text>

  <rect x="1100" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1175" y="192" class="cardMain">결과 확인</text>
  <rect x="1158" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="1175" y="98" class="pillText">02</text>

  <rect x="1100" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1175" y="392" class="cardMain">대표·연관 선정</text>
  <text x="1175" y="410" class="cardCode">POST /search/select</text>

  <rect x="1270" y="155" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1345" y="192" class="cardMain">엑셀 다운로드</text>
  <rect x="1328" y="82" width="34" height="22" rx="11" fill="#1f3a5f"/>
  <text x="1345" y="98" class="pillText">03</text>

  <rect x="1270" y="365" width="150" height="64" rx="10" fill="#ffffff" stroke="#647a94" stroke-width="1.3"/>
  <text x="1345" y="392" class="cardMain">엑셀 생성</text>
  <text x="1345" y="410" class="cardCode">GET /result/{id}/excel</text>

  <!-- ===== 요청(실선, 사용자→시스템) ===== -->
  <path d="M155,219 L155,365" class="solid"/>
  <path d="M325,219 L325,365" class="solid"/>
  <path d="M495,219 L495,365" class="solid"/>
  <path d="M665,219 L665,365" class="solid"/>
  <path d="M1005,219 L1005,365" class="solid"/>
  <path d="M1175,219 L1175,365" class="solid"/>
  <path d="M1345,219 L1345,365" class="solid"/>

  <!-- ===== 회신(점선, 시스템→다음 단계 사용자) ===== -->
  <path d="M230,397 L250,219" class="dashed"/>
  <path d="M400,397 L420,219" class="dashed"/>
  <path d="M570,397 L590,219" class="dashed"/>
  <path d="M1080,397 L1100,219" class="dashed"/>
  <path d="M1250,397 L1270,219" class="dashed"/>
</svg>

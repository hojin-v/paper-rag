<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title">
  <title id="title">배치 다이어그램</title>
  <defs>
    <marker id="aC" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#33475b"/></marker>
    <marker id="aD" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8aa0b5"/></marker>
    <style>
      .title{font:700 25px system-ui,sans-serif;fill:#0f2438}
      .grp{font:700 14px system-ui,sans-serif}
      .cMain{font:600 13.5px system-ui,sans-serif;fill:#1e293b;text-anchor:middle}
      .cCode{font:500 10.5px ui-monospace,monospace;fill:#64748b;text-anchor:middle}
      .cVol{font:600 11.5px ui-monospace,monospace;fill:#3f5163;text-anchor:middle}
      .flow{stroke:#33475b;stroke-width:2.2;fill:none;marker-end:url(#aC)}
      .dep{stroke:#8aa0b5;stroke-width:1.6;fill:none;marker-end:url(#aD)}
      .lbl{font:600 12px system-ui,sans-serif;fill:#41586e;text-anchor:middle}
      .note{font:500 12.5px system-ui,sans-serif;fill:#5b6b7d;text-anchor:middle}
    </style>
  </defs>
  <rect width="1400" height="620" fill="#ffffff"/>
  <text x="55" y="36" class="title">배치 다이어그램 — 온프레미스 단일 서버</text>

  <!-- CD 트리거 strip -->
  <rect x="55" y="52" width="470" height="92" rx="8" fill="#eef4ff" stroke="#c3d8f2" stroke-width="1.4"/>
  <text x="75" y="76" class="grp" fill="#2b6cb0">GitHub (클라우드)</text>
  <rect x="75" y="88" width="125" height="44" rx="8" fill="#fff" stroke="#8aa0b5" stroke-width="1.2"/><text x="137" y="115" class="cMain">paper-rag repo</text>
  <rect x="218" y="88" width="135" height="44" rx="8" fill="#fff" stroke="#8aa0b5" stroke-width="1.2"/><text x="285" y="115" class="cMain">ci.yml · 테스트</text>
  <rect x="372" y="88" width="140" height="44" rx="8" fill="#fff" stroke="#8aa0b5" stroke-width="1.2"/><text x="442" y="115" class="cMain">deploy.yml</text>
  <path d="M200,110 L216,110" class="flow"/>
  <path d="M353,110 L370,110" class="flow"/>

  <rect x="560" y="52" width="345" height="92" rx="8" fill="#eef4ff" stroke="#c3d8f2" stroke-width="1.4"/>
  <text x="580" y="76" class="grp" fill="#2b6cb0">셀프호스트 러너 (온프레미스)</text>
  <rect x="580" y="88" width="305" height="44" rx="8" fill="#fff" stroke="#8aa0b5" stroke-width="1.2"/><text x="732" y="115" class="cMain">scripts/deploy.sh</text>
  <path d="M512,110 L558,110" class="flow"/>
  <text x="535" y="102" class="lbl">병합</text>

  <!-- Docker Host -->
  <rect x="55" y="176" width="1290" height="420" rx="8" fill="#f1f7f4" stroke="#c3e2d5" stroke-width="1.5"/>
  <text x="75" y="202" class="grp" fill="#0f766e">Docker Host — 온프레미스 단일 서버 · docker compose</text>
  <path d="M732,144 L732,230" class="flow"/>
  <text x="772" y="192" class="lbl">빌드·배포</text>

  <!-- 앱 서비스 -->
  <rect x="80" y="230" width="1240" height="104" rx="8" fill="#f7fbff" stroke="#cfe0f2" stroke-width="1.3"/>
  <text x="100" y="253" class="grp" fill="#334155">앱 서비스 · 단일 이미지 paperrag:{git_sha} 공유</text>
  <rect x="140" y="266" width="250" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="265" y="290" class="cMain">api</text><text x="265" y="309" class="cCode">uvicorn :8000</text>
  <rect x="420" y="266" width="250" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="545" y="290" class="cMain">worker</text><text x="545" y="309" class="cCode">celery -A paperrag.worker.app</text>
  <rect x="700" y="266" width="250" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="825" y="290" class="cMain">ui</text><text x="825" y="309" class="cCode">streamlit :8501</text>
  <rect x="980" y="266" width="280" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="1120" y="290" class="cMain">embedder</text><text x="1120" y="309" class="cCode">uvicorn :8100</text>

  <!-- 인프라 서비스 -->
  <rect x="80" y="356" width="600" height="104" rx="8" fill="#f7fbff" stroke="#cfe0f2" stroke-width="1.3"/>
  <text x="100" y="379" class="grp" fill="#334155">인프라 서비스</text>
  <rect x="100" y="392" width="180" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="190" y="416" class="cMain">postgres :5433</text><text x="190" y="435" class="cCode">pgvector/pgvector:pg16</text>
  <rect x="298" y="392" width="165" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="380" y="416" class="cMain">redis :6379</text><text x="380" y="435" class="cCode">redis:7-alpine</text>
  <rect x="480" y="392" width="185" height="56" rx="9" fill="#fff" stroke="#647a94" stroke-width="1.3"/><text x="572" y="416" class="cMain">ollama :11434</text><text x="572" y="435" class="cCode">ollama/ollama</text>

  <!-- 볼륨 -->
  <rect x="700" y="356" width="620" height="104" rx="8" fill="#f7fbff" stroke="#cfe0f2" stroke-width="1.3"/>
  <text x="720" y="379" class="grp" fill="#334155">볼륨 · 바인드 마운트 (컨테이너 재생성에도 보존)</text>
  <rect x="715" y="394" width="112" height="52" rx="8" fill="#eef2f7" stroke="#a9b8c8" stroke-width="1.2"/><text x="771" y="424" class="cVol">pgdata</text>
  <rect x="833" y="394" width="120" height="52" rx="8" fill="#eef2f7" stroke="#a9b8c8" stroke-width="1.2"/><text x="893" y="424" class="cVol">ollama_models</text>
  <rect x="959" y="394" width="118" height="52" rx="8" fill="#eef2f7" stroke="#a9b8c8" stroke-width="1.2"/><text x="1018" y="424" class="cVol">./data/review</text>
  <rect x="1083" y="394" width="100" height="52" rx="8" fill="#eef2f7" stroke="#a9b8c8" stroke-width="1.2"/><text x="1133" y="424" class="cVol">./outputs</text>
  <rect x="1189" y="394" width="118" height="52" rx="8" fill="#eef2f7" stroke="#a9b8c8" stroke-width="1.2"/><text x="1248" y="424" class="cVol">./models (ro)</text>

  <!-- 대표 의존 화살표 -->
  <path d="M240,322 L205,390" class="dep"/>
  <path d="M520,322 L392,390" class="dep"/>
  <path d="M560,322 L580,390" class="dep"/>

  <text x="700" y="512" class="note">api · worker  →  postgres · redis · ollama · embedder 사용   ·   ui → api</text>
  <text x="700" y="540" class="note">롤백은 이미지(코드)만 이전 SHA로 되돌림 — 이미 적용된 DB 마이그레이션은 자동 복원하지 않음</text>
</svg>
